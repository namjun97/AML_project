name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 배포 전 유효성 검사
  # ──────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 핵심 의존성 설치 (빠른 검증용)
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas numpy xgboost joblib

      - name: app.py 구문 검사
        run: |
          python -c "
          import ast, sys
          with open('app.py', 'r', encoding='utf-8') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('app.py syntax OK')
          except SyntaxError as e:
              print('SyntaxError:', e)
              sys.exit(1)
          "

      - name: requirements.txt 존재 확인
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requirements.txt not found"
            exit 1
          fi
          echo "requirements.txt OK"

  # ──────────────────────────────────────────────
  # Job 2: Hugging Face Spaces 자동 배포
  #
  # git push 대신 huggingface_hub.upload_folder 사용
  # → LFS / Xet 스토리지 문제 없이 파일 직접 업로드
  #
  # GitHub Secrets 에 HF_TOKEN 등록 필요
  # (HF Settings > Access Tokens > Write 권한)
  # ──────────────────────────────────────────────
  deploy-to-hf:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          lfs: true   # LFS 파일(.pdf/.ttf 등)을 포인터가 아닌 실제 내용으로 받기

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: huggingface_hub 설치
        run: pip install huggingface_hub

      - name: HF Spaces 에 파일 업로드
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os, time
          from huggingface_hub import HfApi

          # ── YAML 검증을 best-effort 로 강등 ──────────────────────────────
          # huggingface_hub 0.36.x 의 _validate_yaml 은 /api/validate-yaml 응답을
          # 무조건 .json() 한다. HF 가 간헐적으로 빈 응답을 주면 JSONDecodeError 로
          # 업로드 전체가 실패한다. README 메타데이터는 Space 빌드 시 어차피 재검증되므로
          # 여기서는 검증 실패를 무시하고 업로드를 진행한다.
          _orig_validate = HfApi._validate_yaml
          def _safe_validate(self, content, **kwargs):
              try:
                  return _orig_validate(self, content, **kwargs)
              except Exception as exc:
                  print(f"[warn] README YAML 검증 건너뜀 (비필수): {type(exc).__name__}: {exc}")
                  return None
          HfApi._validate_yaml = _safe_validate

          api = HfApi(token=os.environ["HF_TOKEN"])
          REPO = "Vartyor/aml-project"

          # ── stale 바이너리 강제 갱신 ─────────────────────────────────────
          # upload_folder 는 '내용이 바뀐 파일만' 재업로드한다. 최초 배포 때 GitHub LFS
          # 포인터 상태로 올라가 깨진 바이너리(예: model/saml_gnn.pth)가 이후 내용 무변경이면
          # HF 에 깨진 채 영구히 남아 torch.load 가 'invalid load key' 로 실패한다.
          # → 업로드 전에 삭제해 강제 재업로드(checkout 의 실제 내용으로)한다.
          try:
              api.delete_folder(path_in_repo="model", repo_id=REPO, repo_type="space",
                                commit_message="refresh: model artifacts 재업로드")
              print("[refresh] model/ 삭제 완료 — 재업로드 예정")
          except Exception as exc:
              print(f"[refresh] model/ 삭제 건너뜀: {type(exc).__name__}: {exc}")

          # 업로드 제외 패턴 (로컬 전용 파일)
          ignore_patterns = [
              ".git/*",
              ".github/*",
              ".venv/*",
              "venv/*",
              "__pycache__/*",
              "*.pyc",
              ".env",
              ".env.*",
              "secrets.toml",
              "dataset/*",
              "chroma_db/*",
              "tests/*",
              "*.pptx",
              "*.docx",
          ]

          # ── 업로드 (일시적 HF API 오류 대비 재시도) ──────────────────────
          last_err = None
          for attempt in range(1, 4):
              try:
                  api.upload_folder(
                      folder_path=".",
                      repo_id="Vartyor/aml-project",
                      repo_type="space",
                      ignore_patterns=ignore_patterns,
                      commit_message=f"deploy: {os.environ.get('GITHUB_SHA', 'manual')[:7]}",
                  )
                  print("HF Spaces 업로드 완료")
                  break
              except Exception as exc:
                  last_err = exc
                  print(f"[시도 {attempt}/3] 업로드 실패: {type(exc).__name__}: {exc}")
                  if attempt < 3:
                      time.sleep(15)
          else:
              raise SystemExit(f"3회 시도 후 업로드 실패: {last_err}")
          EOF

      - name: 배포 완료 알림
        run: |
          echo "## Hugging Face Spaces 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 브랜치 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포자 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
